name: Compliance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compliance:
    name: Typecheck + Lint + Test + Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test:unit

      - name: Build extension
        run: pnpm build

      - name: Run integration tests
        run: pnpm test:integration

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Validate blueprints
        run: pnpm validate:blueprints

      - name: Validate grep-gates
        run: pnpm validate:grep-gates

      - name: Validate protocol schema
        run: pnpm validate:protocol-schema

      - name: Anti-drift gate - no em-dash
        run: bash scripts/check-no-em-dash.sh

      - name: Anti-drift gate - no console outside logger
        run: bash scripts/check-no-console.sh

      - name: Anti-drift gate - no forbidden tokens
        run: bash scripts/check-forbidden-tokens.sh

      - name: Upload chrome-mv3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-mv3
          path: .output/chrome-mv3/
          retention-days: 7

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: tests/e2e/.test-results/
          retention-days: 7
